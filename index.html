<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C24B0F" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<title> Spark Homes - Repair Estimator </title>

<link rel="manifest" id="manifest-link">
<style>
:root {
  --brand: #C24B0F;
  --brand-dark: #9a3b0a;
  --brand-light: #F9EDE7;
  --bg: #F5F4F1;
  --surface: #FFFFFF;
  --surface2: #F0EFEc;
  --border: #E2E0D8;
  --border-strong: #C8C5BA;
  --text: #1C1B18;
  --text2: #5A5852;
  --text3: #9C9A93;
  --green: #1F7A4A;
  --green-bg: #E8F5EE;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --amber: #92400E;
  --amber-bg: #FEF3C7;
  --blue: #1D4ED8;
  --blue-bg: #EFF6FF;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --radius: 10px;
  --header-h: 56px;
}
[data-theme="dark"] {
  --bg: #111110;
  --surface: #1C1C1A;
  --surface2: #252522;
  --border: #2E2D2A;
  --border-strong: #424040;
  --text: #F0EFE9;
  --text2: #A8A69E;
  --text3: #6A6860;
  --brand-light: #2D1A0E;
  --green-bg: #0D2B1A;
  --red-bg: #2D0E0E;
  --amber-bg: #2D1E08;
  --blue-bg: #0E1E38;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 1px 4px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}

#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}
.header{background:var(--surface);border-bottom:1px solid var(--border);z-index:50;flex-shrink:0}
.header-inner{height:var(--header-h);padding:0 14px;display:flex;align-items:center;gap:10px}
.logo-img{height:26px;width:auto;object-fit:contain}
.header-spacer{flex:1}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background .12s;flex-shrink:0}
.icon-btn:active{background:var(--surface2)}
.theme-btn{font-size:17px}

.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 8px;flex-shrink:0}
.tab{flex:1;height:44px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;position:relative;transition:color .15s}
.tab.active{color:var(--brand);font-weight:600}
.tab.active::after{content:"";position:absolute;bottom:0;left:8px;right:8px;height:2.5px;background:var(--brand);border-radius:2px 2px 0 0}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:var(--text3)}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.card-total{font-size:14px;font-weight:700;color:var(--text);min-width:60px;text-align:right}
.card-total.nonzero{color:var(--brand)}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s;line-height:1}
.card.open .chevron{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}

.section-hdr{padding:18px 2px 8px;display:flex;align-items:center;gap:8px}
.section-hdr-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.section-hdr-line{flex:1;height:1px;background:var(--border)}
.section-hdr-total{font-size:12px;font-weight:700;color:var(--brand)}

.line-item{padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);position:relative}
.line-item:last-child{border-bottom:none}
.line-check{width:20px;height:20px;border:1.5px solid var(--border-strong);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.line-check.on{background:var(--brand);border-color:var(--brand);color:#fff}
.line-check.on::after{content:"✓";font-size:11px;font-weight:800}
.line-info{flex:1;min-width:0}
.line-name{font-size:13px;font-weight:500;line-height:1.3}
.line-unit-cost{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-top:1px;flex-wrap:wrap}
.line-unit-cost .edit-cost{font-size:10px;color:var(--brand);border:none;background:none;cursor:pointer;padding:0;text-decoration:underline}
.line-inputs{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qty-input{width:52px;height:34px;border:1px solid var(--border);border-radius:7px;padding:0 6px;font-size:13px;font-weight:600;color:var(--text);background:var(--surface2);outline:none;text-align:center;-webkit-appearance:none}
.qty-input:focus{border-color:var(--brand)}
.line-total{font-size:12px;font-weight:700;color:var(--brand);min-width:52px;text-align:right}
.del-btn{padding:0 2px;color:var(--text3);background:none;border:none;cursor:pointer;font-size:14px;line-height:1;opacity:.6}
.del-btn:active{opacity:1;color:var(--red)}

.no-action-item{padding:9px 14px;border-bottom:1px solid var(--border)}
.no-action-item:last-child{border-bottom:none}
.no-action-btn{display:flex;align-items:center;gap:8px;cursor:pointer;width:100%}
.no-action-check{width:20px;height:20px;border:1.5px solid var(--border-strong);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.no-action-check.on{background:var(--green);border-color:var(--green);color:#fff}
.no-action-check.on::after{content:"✓";font-size:11px;font-weight:800}
.no-action-label{font-size:13px;color:var(--text2)}

.add-item-row{padding:8px 14px;border-top:1px solid var(--border)}
.add-item-btn{width:100%;height:34px;border:1.5px dashed var(--border-strong);border-radius:8px;background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:border-color .12s,color .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.add-item-btn:active{border-color:var(--brand);color:var(--brand)}

.progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;flex-shrink:0}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.progress-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.progress-pct{font-size:12px;font-weight:700;color:var(--brand)}
.progress-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),#E8783C);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

.sticky-total{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sticky-total-label{font-size:12px;color:var(--text3);font-weight:500}
.sticky-total-val{font-size:20px;font-weight:800;color:var(--brand);letter-spacing:-.5px}

/* INPUTS */
.field-group{margin-bottom:12px}
.field-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field-input{width:100%;height:42px;border:1px solid var(--border);border-radius:9px;padding:0 12px;font-size:14px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .12s;-webkit-appearance:none}
.field-input:focus{border-color:var(--brand);background:var(--surface)}
select.field-input{cursor:pointer}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-brand{background:var(--brand-light);color:var(--brand)}

/* BUTTONS */
.btn{height:44px;border-radius:11px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 16px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:active{background:var(--brand-dark)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:active{background:var(--surface2)}
.btn-block{width:100%}
.btn-sm{height:34px;font-size:12px;padding:0 12px;border-radius:8px}

.room-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s}
.room-chip.active{background:var(--brand-light);border-color:var(--brand);color:var(--brand);font-weight:700}
.room-chip .del-room{font-size:11px;color:var(--text3);margin-left:2px}
.room-strip{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--border)}

.photo-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.photo-strip::-webkit-scrollbar{display:none}
.photo-thumb{width:72px;height:72px;flex-shrink:0;border-radius:10px;overflow:hidden;border:1px solid var(--border);position:relative;cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .del-photo{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.65);border:none;border-radius:50%;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-add-btn{width:72px;height:72px;flex-shrink:0;border-radius:10px;border:1.5px dashed var(--border-strong);background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:11px}
.photo-add-btn:active{border-color:var(--brand)}
#photo-input{display:none}

/* PROJECTS LIST */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .12s}
.proj-card:active{border-color:var(--brand)}
.proj-card.selected{border-color:var(--brand);background:var(--brand-light)}
.proj-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.proj-name{font-size:15px;font-weight:700}
.proj-total{font-size:15px;font-weight:800;color:var(--brand)}
.proj-meta{font-size:11px;color:var(--text3);margin-top:3px}
.proj-actions{display:flex;gap:6px;margin-top:10px}

.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:10px}
.deal-header{padding:12px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.deal-title{font-size:14px;font-weight:700}
.deal-sub{font-size:11px;color:var(--text3)}
.deal-body{padding:13px 14px}
.slider-wrap{margin-bottom:14px}
.slider-label-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.slider-key{color:var(--text3);font-weight:500}
.slider-val{font-weight:700;color:var(--text)}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);border:2.5px solid var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer}
.mao-box{background:var(--brand);border-radius:12px;padding:16px;text-align:center;margin:4px 0 14px}
.mao-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.65)}
.mao-value{font-size:30px;font-weight:900;color:#fff;letter-spacing:-1px;margin:2px 0}
.mao-formula{font-size:10px;color:rgba(255,255,255,.55)}
.deal-verdict{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:11px;margin-bottom:10px}
.verdict-icon{font-size:26px;line-height:1}
.verdict-hd{font-size:14px;font-weight:700}
.verdict-sub{font-size:11px;color:var(--text2);margin-top:2px}
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.profit-row:last-child{border-bottom:none;font-weight:700;font-size:14px;padding-top:10px}
.profit-label{color:var(--text2)}
.profit-val.neg{color:var(--red)}
.profit-val.pos{color:var(--green)}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 env(safe-area-inset-bottom,20px);max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:12px auto 16px}
.modal-inner{padding:0 16px 24px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.serial-result{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--blue-bg);color:var(--blue);font-weight:600;margin-top:4px;display:inline-block}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:13px}

.notes-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.notes-textarea{width:100%;min-height:84px;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14px;line-height:1.4;color:var(--text);background:var(--surface2);outline:none;resize:vertical;font-family:inherit;-webkit-appearance:none}
.notes-textarea:focus{border-color:var(--brand);background:var(--surface)}
.helper-note{font-size:11px;color:var(--text3);margin-top:6px}
.disabled-item{opacity:.48}

</style>
</head>

let DB = {
  projects: [],
  activeProjectId: null,
  globalPriceOverrides: {},
  theme: "light"
};

function getProject(id) { return DB.projects.find(p=>p.id===(id||DB.activeProjectId)); }
function activeProject() { return getProject(DB.activeProjectId); }


function ensureProjectShape(p) {
  if (!p) return p;
  if (!p.items) p.items = {};
  if (!p.noAction) p.noAction = {};
  if (!p.customItems) p.customItems = {};
  if (!Array.isArray(p.rooms)) p.rooms = [];
  if (!Array.isArray(p.photos)) p.photos = [];
  if (!p.notes || typeof p.notes !== "object" || Array.isArray(p.notes)) p.notes = { project: p.notes ? String(p.notes) : "" };
  if (typeof p.notes.project !== "string") p.notes.project = p.notes.project ? String(p.notes.project) : "";
  if (!p._deletedItems) p._deletedItems = {};
  if (!p.created) p.created = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return p;
}
function ensureDBShape() {
  if (!DB || !Array.isArray(DB.projects)) DB = {projects:[],activeProjectId:null,globalPriceOverrides:{},theme:"light"};
  if (!DB.globalPriceOverrides) DB.globalPriceOverrides = {};
  DB.projects.forEach(ensureProjectShape);
}
function isDeleted(proj, groupKey, itemId) {
  const deleted = proj?._deletedItems?.[groupKey];
  return Array.isArray(deleted) && deleted.includes(itemId);
}
function splitItemKey(itemKey) {
  const i = itemKey.lastIndexOf(":");
  return {groupKey:itemKey.slice(0,i), itemId:itemKey.slice(i+1)};
}
function getProjectNotes(proj) {
  ensureProjectShape(proj);
  return proj?.notes?.project || "";
}
function setProjectNotes(value) {
  const proj = activeProject();
  if (!proj) return;
  ensureProjectShape(proj);
  proj.notes.project = value || "";
  save();
}
function sanitizeFileName(name) {
  return String(name || "spark_project").replace(/[^a-z0-9_-]+/gi,"_").replace(/^_+|_+$/g,"") || "spark_project";
}


function newProject(name) {
  const id = Date.now().toString();
  return {
    id,
    name: name || "New project",
    created: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
    items: {},       // key: "groupKey:itemId" → {qty, costOverride}
    noAction: {},    // key: groupKey → bool
    customItems: {}, // key: groupKey → [{id,name,cost,unit,qty}]
    rooms: [{id:id+"_bath1", type:"bathroom", label:"Bathroom 1", num:1}],       // [{type, label, num}]
    photos: [],      // [{dataUrl, serial?}]
    arv: 200000,
    margin: 70,
    asking: 0,
    notes: { project: "" },
    _deletedItems: {}
  };
}

let _currentTab = "estimate";
let _priceModalMeta = null;
let _addItemGroupKey = null;


function save() {
  try { localStorage.setItem("spark_db_v3", JSON.stringify(DB)); } catch(e){}
}

function load() {
  try {
    const raw = localStorage.getItem("spark_db_v3") || localStorage.getItem("spark_db_v2");
    if (raw) DB = JSON.parse(raw);
  } catch(e){}
  ensureDBShape();
  if (!DB.projects.length) {
    const p = newProject("123 Main St, Tulsa OK");
    DB.projects.push(p);
    DB.activeProjectId = p.id;
  }
  if (!DB.activeProjectId && DB.projects.length) DB.activeProjectId = DB.projects[0].id;
  ensureDBShape();
  save();
}

function resolvePriceForProject(proj, itemId, groupKey) {
  const itemKey = groupKey+":"+itemId;
  if (proj && proj.items && proj.items[itemKey]?.costOverride != null) return Number(proj.items[itemKey].costOverride) || 0;
  if (DB.globalPriceOverrides && DB.globalPriceOverrides[itemId] != null) return Number(DB.globalPriceOverrides[itemId]) || 0;
  const base = PRICE_LIST_RAW.find(i=>i.id===itemId);
  return base ? Number(base.cost) || 0 : 0;
}

function resolvePrice(itemId, groupKey) {
  return resolvePriceForProject(activeProject(), itemId, groupKey);
}

function getItemDef(itemId) { return PRICE_LIST_RAW.find(i=>i.id===itemId); }


function calcTotal() {
  const proj = activeProject();
  if (!proj) return 0;
  ensureProjectShape(proj);
  let total = 0;
  Object.entries(proj.items||{}).forEach(([key,v])=>{
    if (!v.checked) return;
    const {groupKey, itemId} = splitItemKey(key);
    if (isDeleted(proj, groupKey, itemId)) return;
    const cost = v.costOverride != null ? Number(v.costOverride) || 0 : resolvePriceForProject(proj, itemId, groupKey);
    total += (Number(v.qty)||1)*cost;
  });
  Object.values(proj.customItems||{}).forEach(arr=>{
    (arr||[]).forEach(ci=>{ if(ci.checked) total += (Number(ci.qty)||1)*(Number(ci.cost)||0); });
  });
  return total;
}

function fmt(n) { return Math.round(n).toLocaleString("en-US"); }
function fmtD(n) { return "$"+fmt(n); }

function calcProgress() {
  const proj = activeProject();
  if (!proj) return {done:0,total:0};
  ensureProjectShape(proj);
  const allGroups = getAllGroups();
  let done = 0, total = allGroups.length;
  allGroups.forEach(({groupKey})=>{
    const na = !!proj.noAction[groupKey];
    const hasChecked = Object.entries(proj.items||{}).some(([k,v])=>{
      if (!k.startsWith(groupKey+":") || !v.checked) return false;
      const {itemId} = splitItemKey(k);
      return !isDeleted(proj, groupKey, itemId);
    });
    const hasCustChecked = (proj.customItems[groupKey]||[]).some(ci=>ci.checked);
    if (na || hasChecked || hasCustChecked) done++;
  });
  return {done, total};
}

function getAllGroups() {
  const proj = activeProject();
  const arr = [];
  SECTIONS.forEach(sec=>{
    sec.groups.forEach(grp=>{
      arr.push({groupKey:sec.id+"_"+grp.id, sectionId:sec.id, grpId:grp.id});
    });
  });
  (proj?.rooms||[]).forEach(room=>{
    const tpl = ROOM_TEMPLATES[room.type];
    if (!tpl) return;
    const rk = "room_"+room.id;
    tpl.groups.forEach(grp=>{
      arr.push({groupKey:rk+"_"+grp.id, sectionId:rk, grpId:grp.id});
    });
  });
  return arr;
}

function render() {
  const area = document.getElementById("scroll-area");
  if (_currentTab==="estimate") renderEstimate(area);
  else if (_currentTab==="rooms") renderRooms(area);
  else if (_currentTab==="photos") renderPhotos(area);
  else if (_currentTab==="deal") renderDeal(area);
  updateStickyTotal();
  updateProgress();
}

function updateStickyTotal() {
  document.getElementById("sticky-total").textContent = fmtD(calcTotal());
}
function updateProgress() {
  const {done,total} = calcProgress();
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById("progress-pct").textContent = pct+"%";
  document.getElementById("progress-fill").style.width = pct+"%";
}

function renderGroup(proj, grp, groupKey, sec) {
  ensureProjectShape(proj);
  const noAction = !!proj.noAction[groupKey];
  let grpTotal = 0;
  let itemsHtml = "";

  grp.itemIds.forEach(itemId=>{
    if (isDeleted(proj, groupKey, itemId)) return;
    const def = getItemDef(itemId);
    if (!def) return;
    const itemKey = groupKey+":"+itemId;
    const st = proj.items[itemKey]||{};
    const cost = st.costOverride != null ? Number(st.costOverride) || 0 : resolvePriceForProject(proj, itemId, groupKey);
    const qty = Number(st.qty)||1;
    const lineTotal = st.checked ? qty*cost : 0;
    grpTotal += lineTotal;

    itemsHtml += `<div class="line-item ${noAction?"disabled-item":""}">
      <div class="line-check ${st.checked?"on":""}" onclick="toggleItem('${itemKey}')"></div>
      <div class="line-info">
        <div class="line-name">${esc(def.name)}</div>
        <div class="line-unit-cost">
          <span>${fmtD(cost)}/${esc(def.unit)}</span>
          <button class="edit-cost" onclick="openPriceModal('${itemId}','${groupKey}','${esc(def.name)}')">edit</button>
        </div>
      </div>
      <div class="line-inputs">
        <input class="qty-input" type="number" inputmode="decimal" min="0" step="any" value="${qty}" onchange="setQty('${itemKey}',this.value)">
        ${st.checked ? `<div class="line-total">${fmtD(lineTotal)}</div>` : `<div class="line-total" style="color:var(--text3)">-</div>`}
      </div>
      <button class="del-btn" onclick="deleteItem('${groupKey}','${itemId}')" title="Remove">x</button>
    </div>`;
  });

  const customs = proj.customItems[groupKey]||[];
  customs.forEach((ci,ci_idx)=>{
    const qty = Number(ci.qty)||1;
    const cost = Number(ci.cost)||0;
    const lineTotal = ci.checked ? qty*cost : 0;
    grpTotal += lineTotal;
    itemsHtml += `<div class="line-item ${noAction?"disabled-item":""}">
      <div class="line-check ${ci.checked?"on":""}" onclick="toggleCustomItem('${groupKey}',${ci_idx})"></div>
      <div class="line-info">
        <div class="line-name">${esc(ci.name)} <span class="badge badge-brand" style="font-size:9px">custom</span></div>
        <div class="line-unit-cost">${fmtD(cost)}/${esc(ci.unit||"ea.")}</div>
      </div>
      <div class="line-inputs">
        <input class="qty-input" type="number" inputmode="decimal" min="0" step="any" value="${qty}" onchange="setCustomQty('${groupKey}',${ci_idx},this.value)">
        ${ci.checked ? `<div class="line-total">${fmtD(lineTotal)}</div>` : `<div class="line-total" style="color:var(--text3)">-</div>`}
      </div>
      <button class="del-btn" onclick="deleteCustomItem('${groupKey}',${ci_idx})">x</button>
    </div>`;
  });

  const openState = isCardOpen("grp_"+groupKey);
  const html = `
  <div class="card ${openState?"open":""}" id="card_${groupKey}">
    <div class="card-header" onclick="toggleCard('grp_${groupKey}','card_${groupKey}')">
      <div class="card-icon" style="background:${sec.bg||"#f0f0f0"};color:${sec.color||"#333"}">${sec.icon||"*"}</div>
      <div class="card-info">
        <div class="card-name">${esc(grp.label)}</div>
        <div class="card-sub">${noAction?"No action needed":grpTotal>0?fmtD(grpTotal)+" added":""}</div>
      </div>
      <div class="card-right">
        <div class="card-total ${grpTotal>0?"nonzero":""}">${grpTotal>0?fmtD(grpTotal):""}</div>
        <div class="chevron">v</div>
      </div>
    </div>
    <div class="card-body">
      ${itemsHtml}
      <div class="no-action-item">
        <div class="no-action-btn" onclick="toggleNoAction('${groupKey}')">
          <div class="no-action-check ${noAction?"on":""}"></div>
          <span class="no-action-label">No action needed</span>
        </div>
      </div>
      <div class="add-item-row">
        <button class="add-item-btn" onclick="openAddItemModal('${groupKey}')">+ Add custom item</button>

    </div>
  </div>`;

  return {html, total:grpTotal};
}

function renderDeal(area) {
  const proj = activeProject();
  if (!proj) { area.innerHTML = ""; return; }
  const repairTotal = calcTotal();
  const arv = proj.arv||200000;
  const margin = proj.margin||70;
  const asking = proj.asking||0;
  const mao = Math.max(0, Math.round((arv*margin/100)-repairTotal));
  const spread = asking ? mao-asking : null;

  let verdictHtml = "";
  if (asking) {
    let cls="amber-bg", textColor="amber", icon="⚡", hd="", sub="";
    if (spread>10000) { cls="green-bg"; textColor="green"; icon="🟢"; hd="Strong deal — move on it"; sub=`$${fmt(Math.abs(spread))} below MAO. Good cushion for surprises.`; }
    else if (spread>=0) { cls="amber-bg"; textColor="amber"; icon="🟡"; hd="Pencils out — negotiate"; sub=`Only $${fmt(Math.abs(spread))} of room. Try to get the price down.`; }
    else { cls="red-bg"; textColor="red"; icon="🔴"; hd="Pass — asking too high"; sub=`Overpriced by $${fmt(Math.abs(spread))}. Doesn't work at ${margin}%.`; }
    verdictHtml = `<div class="deal-verdict" style="background:var(--${cls})">
      <div class="verdict-icon">${icon}</div>
      <div><div class="verdict-hd" style="color:var(--${textColor})">${hd}</div><div class="verdict-sub">${sub}</div></div>
    </div>`;
  }

  const closeBuy = Math.round(asking*0.02);
  const closeSell = Math.round(arv*0.06);
  const holding = Math.round(asking*0.03);
  const netProfit = asking ? arv-asking-repairTotal-closeBuy-closeSell-holding : null;
  const profitPct = (asking && arv) ? Math.round((netProfit/arv)*100) : null;

  let html = `
  <div class="deal-card">
    <div class="deal-header"><div class="deal-title">📐 ARV — Max Allowable Offer</div><div class="deal-sub">70% Rule deal analyzer</div></div>
    <div class="deal-body">
      <div class="slider-wrap">
        <div class="slider-label-row"><span class="slider-key">After Repair Value (ARV)</span><span class="slider-val">${fmtD(arv)}</span></div>
        <input type="range" min="50000" max="600000" step="5000" value="${arv}" oninput="updateDealField('arv',+this.value)">
      </div>
      <div class="slider-wrap">
        <div class="slider-label-row"><span class="slider-key">Target margin %</span><span class="slider-val">${margin}%</span></div>
        <input type="range" min="50" max="85" step="1" value="${margin}" oninput="updateDealField('margin',+this.value)">
      </div>
      <div class="slider-wrap">
        <div class="slider-label-row"><span class="slider-key">Repair costs (synced)</span><span class="slider-val">${fmtD(repairTotal)}</span></div>
        <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min(100,(repairTotal/(arv||1))*100)}%;background:var(--brand);border-radius:2px"></div></div>
      </div>
      <div class="mao-box">
        <div class="mao-label">Max Allowable Offer</div>
        <div class="mao-value">${fmtD(mao)}</div>
        <div class="mao-formula">(${fmtD(arv)} × ${margin}%) − ${fmtD(repairTotal)} = ${fmtD(mao)}</div>
      </div>
      <div class="field-group">
        <div class="field-label">Seller asking price</div>
        <input class="field-input" type="number" inputmode="numeric" placeholder="Enter asking price…" value="${asking||""}" oninput="updateDealField('asking',+this.value)">
      </div>
      ${verdictHtml}
      ${asking ? `
      <div style="margin-top:10px">
        <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Profit scenario</div>
        ${[["ARV",arv,true],["Purchase price",-asking,false],["Repair costs",-repairTotal,false],["Buying costs (~2%)",-closeBuy,false],["Selling costs (~6%)",-closeSell,false],["Holding costs (~3%)",-holding,false]].map(([l,v,first])=>
          `<div class="profit-row"><span class="profit-label">${l}</span><span class="profit-val ${v<0?"neg":"pos"}">${v<0?"-":""}${fmtD(Math.abs(v))}</span></div>`).join("")}
        <div class="profit-row"><span>Net profit</span><span class="profit-val ${netProfit>=0?"pos":"neg"}" style="font-size:15px">${netProfit>=0?"":"−"}${fmtD(Math.abs(netProfit))} (${profitPct}%)</span></div>
      </div>` : ""}
    </div>
  </div>`;

  area.innerHTML = html;
}

function toggleItem(itemKey) {
  const proj = activeProject();
  if (!proj) return;
  ensureProjectShape(proj);
  const {groupKey, itemId} = splitItemKey(itemKey);
  if (isDeleted(proj, groupKey, itemId)) return;
  if (!proj.items[itemKey]) proj.items[itemKey] = {};
  proj.items[itemKey].checked = !proj.items[itemKey].checked;
  if (proj.items[itemKey].checked) {
    if (!proj.items[itemKey].qty) proj.items[itemKey].qty = 1;
    proj.noAction[groupKey] = false;
  }
  save(); render();
}
function setQty(itemKey, val) {
  const proj = activeProject();
  if (!proj || !proj.items[itemKey]) return;
  proj.items[itemKey].qty = parseFloat(val)||0;
  save(); render();
}
function toggleNoAction(groupKey) {
  const proj = activeProject();
  if (!proj) return;
  ensureProjectShape(proj);
  const next = !proj.noAction[groupKey];
  proj.noAction[groupKey] = next;
  if (next) {
    Object.keys(proj.items||{}).forEach(k=>{
      if (k.startsWith(groupKey+":")) proj.items[k].checked = false;
    });
    (proj.customItems[groupKey]||[]).forEach(ci=>{ ci.checked = false; });
  }
  save(); render();
}
function toggleCustomItem(groupKey, idx) {
  const proj = activeProject();
  if (!proj || !proj.customItems[groupKey]) return;
  proj.customItems[groupKey][idx].checked = !proj.customItems[groupKey][idx].checked;
  if (proj.customItems[groupKey][idx].checked) proj.noAction[groupKey] = false;
  save(); render();
}
function setCustomQty(groupKey, idx, val) {
  const proj = activeProject();
  if (!proj || !proj.customItems[groupKey]) return;
  proj.customItems[groupKey][idx].qty = parseFloat(val)||0;
  save(); render();
}
function deleteItem(groupKey, itemId) {
  const proj = activeProject();
  if (!proj) return;
  ensureProjectShape(proj);
  const itemKey = groupKey+":"+itemId;
  delete proj.items[itemKey];
  if (!proj._deletedItems[groupKey]) proj._deletedItems[groupKey] = [];
  if (!proj._deletedItems[groupKey].includes(itemId)) proj._deletedItems[groupKey].push(itemId);
  save(); render();
  toast("Item removed from this project");

function deleteCustomItem(groupKey, idx) {
  const proj = activeProject();
  (proj.customItems[groupKey]||[]).splice(idx,1);

}
function updateDealField(field, val) {

const roomCounts = {};
function addRoom(type) {
  const proj = activeProject();
  const tpl = ROOM_TEMPLATES[type];
  if (!proj || !tpl) return;
  ensureProjectShape(proj);
  const nextNum = (proj.rooms||[]).filter(r=>r.type===type).reduce((max,r)=>Math.max(max, Number(r.num)||0),0) + 1;
  proj.rooms.push({id:Date.now().toString()+"_"+Math.random().toString(36).slice(2,6), type, label:`${tpl.label} ${nextNum}`, num:nextNum});
  save(); render();
  toast(`${tpl.label} ${nextNum} added`);
}
function removeRoom(idx) {
  const proj = activeProject();
  if (!proj) return;
  const room = proj.rooms[idx];
  if (!room) return;
  if (!confirm(`Remove ${room.label}? Its selections will be cleared from this project.`)) return;
  const rk = "room_"+room.id;
  Object.keys(proj.items||{}).forEach(k=>{ if (k.startsWith(rk+"_")) delete proj.items[k]; });
  Object.keys(proj.customItems||{}).forEach(k=>{ if (k.startsWith(rk+"_")) delete proj.customItems[k]; });
  Object.keys(proj.noAction||{}).forEach(k=>{ if (k.startsWith(rk+"_")) delete proj.noAction[k]; });
  Object.keys(proj._deletedItems||{}).forEach(k=>{ if (k.startsWith(rk+"_")) delete proj._deletedItems[k]; });
  proj.rooms.splice(idx,1);
  save(); render();
}

// PHOTOS
function handlePhotos(e) {
  const proj = activeProject();
  const files = Array.from(e.target.files);
  files.forEach(file=>{
    const r = new FileReader();
    r.onload = ev=>{
      const dataUrl = ev.target.result;
      const serial = tryParseSerial(dataUrl, file.name);
      proj.photos = proj.photos||[];
      proj.photos.push({dataUrl, serial, ts:Date.now()});
      save();
      if (_currentTab==="photos") renderPhotos(document.getElementById("scroll-area"));
    };
    r.readAsDataURL(file);
  });
  e.target.value = "";
}

function tryParseSerial(dataUrl, filename) {
  // Attempt to parse serial number from filename (cameras often embed model info)
  // Pattern: look for SN, S/N, Serial, or long alphanumeric sequences
  const patterns = [/[Ss][Nn][-:_]?([A-Z0-9]{6,20})/,/[Ss]erial[-:_ ]?([A-Z0-9]{6,20})/,/([A-Z]{2,4}[0-9]{6,15})/];
  for (const pat of patterns) {
    const m = filename.match(pat);
    if (m) return m[1];
  }
  return null;
}

function calcProjectTotal(proj) {
  ensureProjectShape(proj);
  let t=0;
  Object.entries(proj.items||{}).forEach(([k,v])=>{
    if(!v.checked)return;
    const {groupKey,itemId}=splitItemKey(k);
    if (isDeleted(proj, groupKey, itemId)) return;
    const c=v.costOverride!=null?Number(v.costOverride)||0:resolvePriceForProject(proj,itemId,groupKey);
    t+=(Number(v.qty)||1)*c;
  });
  Object.values(proj.customItems||{}).forEach(arr=>(arr||[]).forEach(ci=>{if(ci.checked)t+=(Number(ci.qty)||1)*(Number(ci.cost)||0);}));
  return t;
}

function buildExportRows(proj) {
  ensureProjectShape(proj);
  const rows = [
    ["Spark Homes Repair Estimate"],
    ["Project", proj.name || "Untitled project"],
    ["Created", proj.created || ""],
    ["Exported", new Date().toLocaleString()],
    ["Grand Total", calcTotal()],
    ["Notes", getProjectNotes(proj)],
    [],
    ["Group","Item","Qty","Unit","Unit Cost","Line Total"]
  ];
  const pushLine = (groupLabel, itemName, qty, unit, cost) => {
    qty = Number(qty)||1;
    cost = Number(cost)||0;
    rows.push([groupLabel, itemName, qty, unit || "", cost, qty*cost]);
  };
  SECTIONS.forEach(sec=>{
    sec.groups.forEach(grp=>{
      const groupKey = sec.id+"_"+grp.id;
      grp.itemIds.forEach(itemId=>{
        if (isDeleted(proj, groupKey, itemId)) return;
        const ik = groupKey+":"+itemId;
        const st = proj.items[ik]||{};
        if (!st.checked) return;
        const def = getItemDef(itemId);
        if (!def) return;
        const cost = st.costOverride!=null ? Number(st.costOverride)||0 : resolvePriceForProject(proj,itemId,groupKey);
        pushLine(sec.label+" > "+grp.label, def.name, st.qty||1, def.unit, cost);
      });
      (proj.customItems[groupKey]||[]).forEach(ci=>{
        if (!ci.checked) return;
        pushLine(sec.label+" > "+grp.label, ci.name+" (custom)", ci.qty||1, ci.unit||"ea.", ci.cost);
      });
    });
  });
  (proj.rooms||[]).forEach(room=>{
    const tpl = ROOM_TEMPLATES[room.type];
    if (!tpl) return;
    const rk = "room_"+room.id;
    tpl.groups.forEach(grp=>{
      const groupKey = rk+"_"+grp.id;
      grp.itemIds.forEach(itemId=>{
        if (isDeleted(proj, groupKey, itemId)) return;
        const ik = groupKey+":"+itemId;
        const st = proj.items[ik]||{};
        if (!st.checked) return;
        const def = getItemDef(itemId);
        if (!def) return;
        const cost = st.costOverride!=null ? Number(st.costOverride)||0 : resolvePriceForProject(proj,itemId,groupKey);
        pushLine(room.label+" > "+grp.label, def.name, st.qty||1, def.unit, cost);
      });
      (proj.customItems[groupKey]||[]).forEach(ci=>{
        if (!ci.checked) return;
        pushLine(room.label+" > "+grp.label, ci.name+" (custom)", ci.qty||1, ci.unit||"ea.", ci.cost);
      });
    });
  });
  rows.push([]);
  rows.push(["","","","","TOTAL", calcTotal()]);
  return rows;
}
function xmlEscape(value) {
  return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function excelCol(n) {
  let s = "";
  while (n >= 0) { s = String.fromCharCode((n % 26) + 65) + s; n = Math.floor(n / 26) - 1; }
  return s;
}
function sheetXmlFromRows(rows) {
  const sheetData = rows.map((row,r)=>{
    const cells = row.map((v,c)=>{
      if (v === null || v === undefined || v === "") return "";
      const ref = excelCol(c)+(r+1);
      if (typeof v === "number" && isFinite(v)) return `<c r="${ref}"><v>${v}</v></c>`;
      return `<c r="${ref}" t="inlineStr"><is><t>${xmlEscape(v)}</t></is></c>`;
    }).join("");
    return `<row r="${r+1}">${cells}</row>`;
  }).join("");
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheetViews><sheetView workbookViewId="0"/></sheetViews><sheetFormatPr defaultRowHeight="15"/><cols><col min="1" max="1" width="34" customWidth="1"/><col min="2" max="2" width="48" customWidth="1"/><col min="3" max="6" width="14" customWidth="1"/></cols><sheetData>${sheetData}</sheetData></worksheet>`;
}
function makeXlsxBytes(rows) {
  const files = [
    {name:"[Content_Types].xml", data:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`},
    {name:"_rels/.rels", data:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`},
    {name:"xl/workbook.xml", data:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Repair Estimate" sheetId="1" r:id="rId1"/></sheets></workbook>`},
    {name:"xl/_rels/workbook.xml.rels", data:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`},
    {name:"xl/styles.xml", data:`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="1"><font><sz val="11"/><name val="Calibri"/></font></fonts><fills count="1"><fill><patternFill patternType="none"/></fill></fills><borders count="1"><border/></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs></styleSheet>`},
    {name:"xl/worksheets/sheet1.xml", data:sheetXmlFromRows(rows)}
  ];
  return makeZipBytes(files);
}
const CRC_TABLE = (()=>{
  const table = new Uint32Array(256);
  for (let n=0;n<256;n++) {
    let c=n;
    for (let k=0;k<8;k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[n]=c>>>0;
  }
  return table;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i=0;i<bytes.length;i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function textBytes(str) { return new TextEncoder().encode(String(str)); }
function toBytes(data) {
  if (data instanceof Uint8Array) return data;
  if (data instanceof ArrayBuffer) return new Uint8Array(data);
  return textBytes(data);
}
function u16(n) { return new Uint8Array([n & 255, (n>>>8) & 255]); }
function u32(n) { return new Uint8Array([n & 255, (n>>>8) & 255, (n>>>16) & 255, (n>>>24) & 255]); }
function dosTimeDate(date) {
  const d = date || new Date();
  const time = ((d.getHours() & 31) << 11) | ((d.getMinutes() & 63) << 5) | (Math.floor(d.getSeconds()/2) & 31);
  const day = Math.max(1, d.getDate());
  const dosDate = (((d.getFullYear()-1980) & 127) << 9) | (((d.getMonth()+1) & 15) << 5) | (day & 31);
  return {time, date:dosDate};
}
function concatBytes(parts) {
  const len = parts.reduce((s,p)=>s+p.length,0);
  const out = new Uint8Array(len);
  let off=0;
  parts.forEach(p=>{ out.set(p,off); off+=p.length; });
  return out;
}
function makeZipBytes(fileEntries) {
  const localParts = [];
  const centralParts = [];
  let offset = 0;
  const dt = dosTimeDate(new Date());
  fileEntries.forEach(entry=>{
    const nameBytes = textBytes(entry.name);
    const data = toBytes(entry.data);
    const crc = crc32(data);
    const local = concatBytes([u32(0x04034b50), u16(20), u16(0), u16(0), u16(dt.time), u16(dt.date), u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0), nameBytes, data]);
    localParts.push(local);
    const central = concatBytes([u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(dt.time), u16(dt.date), u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset), nameBytes]);
    centralParts.push(central);
    offset += local.length;
  });
  const centralSize = centralParts.reduce((s,p)=>s+p.length,0);
  const end = concatBytes([u32(0x06054b50), u16(0), u16(0), u16(fileEntries.length), u16(fileEntries.length), u32(centralSize), u32(offset), u16(0)]);
  return concatBytes([...localParts, ...centralParts, end]);
}
function dataUrlToBytes(dataUrl) {
  const parts = String(dataUrl||"").split(",");
  const b64 = parts[1] || "";
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

async function exportZIP() {
  const proj = activeProject();
  if (!proj) return;
  ensureProjectShape(proj);
  toast("Preparing offline export...");
  try {
    const safe = sanitizeFileName(proj.name);
    const rows = buildExportRows(proj);
    const xlsxBytes = makeXlsxBytes(rows);
    const zipFiles = [
      {name:`${safe}_estimate.xlsx`, data:xlsxBytes},
      {name:`${safe}_notes.txt`, data:`Project: ${proj.name || "Untitled project"}\nCreated: ${proj.created || ""}\nExported: ${new Date().toLocaleString()}\nTotal: ${fmtD(calcTotal())}\n\nNotes:\n${getProjectNotes(proj) || "No notes entered."}\n`}
    ];
    (proj.photos||[]).forEach((ph,i)=>{
      if (!ph.dataUrl) return;
      const mime = (ph.dataUrl.match(/^data:([^;]+)/)||[])[1] || "image/jpeg";
      const ext = (mime.split("/")[1] || "jpg").replace("jpeg","jpg");
      zipFiles.push({name:`photos/photo_${String(i+1).padStart(2,"0")}.${ext}`, data:dataUrlToBytes(ph.dataUrl)});
      if (ph.serial) zipFiles.push({name:`photos/photo_${String(i+1).padStart(2,"0")}_serial.txt`, data:`Serial number parsed from filename: ${ph.serial}`});
    });
    const zipBytes = makeZipBytes(zipFiles);
    downloadBlob(new Blob([zipBytes],{type:"application/zip"}), `${safe}_repair_estimate.zip`);
    toast("Export downloaded");
  } catch (err) {
    console.error(err);
    toast("Export failed. Try again.");
  }
}

function loadScript(src) {
    return new Promise((res,rej)=>{
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
    });
}

function setupManifest() {
  const manifest = {
    name:"Spark Repair Estimator",
    short_name:"Spark Homes",
    start_url:"./index.html",
    scope:"./",
    display:"standalone",
    background_color:"#F5F4F1",
    theme_color:"#C24B0F",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%23C24B0F'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='110'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]
  };
  const link = document.getElementById("manifest-link");
  if (!link) return;
  const blobHref = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));
  if (location.protocol === "http:" || location.protocol === "https:") {
    fetch("manifest.webmanifest", {method:"HEAD", cache:"no-store"}).then(r=>{ link.href = r.ok ? "manifest.webmanifest" : blobHref; }).catch(()=>{ link.href = blobHref; });
  } else {
    link.href = blobHref;
  }
}
function setupServiceWorker() {
  if (!("serviceWorker" in navigator)) return;
  const canRegister = location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
  if (!canRegister) return;
  navigator.serviceWorker.register("./sw.js", {scope:"./"}).catch(()=>{
    const inlineSW = `const CACHE="spark-repair-estimator-inline-v1";self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(["./","./index.html"])).then(()=>self.skipWaiting()))});self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("./index.html"))))});`;
    try {
      const swUrl = URL.createObjectURL(new Blob([inlineSW],{type:"application/javascript"}));
      navigator.serviceWorker.register(swUrl,{scope:"./"}).catch(()=>{});
    } catch(e) {}
  });
}
